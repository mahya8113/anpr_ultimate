# docker-compose.yml
# ارکستراسیون کامل سرویس‌های سامانه تشخیص پلاک فارسی ANPR
# شامل: backend, frontend, postgresql, redis, rabbitmq, minio, monitoring

version: '3.8'

# ==================== شبکه‌ها ====================
networks:
  anpr-net:
    driver: bridge
    name: anpr-network

# ==================== حجم‌های ذخیره‌سازی ====================
volumes:
  postgres_data:
    name: anpr_postgres_data
  redis_data:
    name: anpr_redis_data
  rabbitmq_data:
    name: anpr_rabbitmq_data
  minio_data:
    name: anpr_minio_data
  model_data:
    name: anpr_model_data
  uploads_data:
    name: anpr_uploads_data
  logs_data:
    name: anpr_logs_data
  prometheus_data:
    name: anpr_prometheus_data
  grafana_data:
    name: anpr_grafana_data

# ==================== سرویس‌ها ====================
services:
  # ==================== 1. PostgreSQL (پایگاه داده اصلی) ====================
  postgres:
    image: postgres:15-alpine
    container_name: anpr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anpr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anpr_strong_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-anpr_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - anpr-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anpr} -d ${POSTGRES_DB:-anpr_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=false"

  # ==================== 2. Redis (کش و نرخ محدودیت) ====================
  redis:
    image: redis:7-alpine
    container_name: anpr-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_strong_pwd}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - anpr-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    labels:
      - "traefik.enable=false"

  # ==================== 3. RabbitMQ (صف پیام) ====================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: anpr-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - anpr-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rabbitmq.rule=Host(rabbitmq.${DOMAIN:-anpr.ir})"
      - "traefik.http.routers.rabbitmq.entrypoints=websecure"
      - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"

  # ==================== 4. MinIO (ذخیره‌سازی اشیاء) ====================
  minio:
    image: minio/minio:latest
    container_name: anpr-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - anpr-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(minio.${DOMAIN:-anpr.ir})"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(minio-console.${DOMAIN:-anpr.ir})"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
      # ==================== 5. Backend API (سرویس اصلی) ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anpr-backend
    restart: unless-stopped
    environment:
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-anpr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anpr_strong_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-anpr_db}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_strong_pwd}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_strong_pwd}@redis:6379/0
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      # Model paths
      MODEL_PATH: /app/models/yolov8n.pt
      YOLO_PLATE_MODEL_PATH: /app/models/yolov8n_plate_v1.pt
      CRNN_MODEL_PATH: /app/models/crnn_persian_v1.pth
      # Settings
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.5}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
      RATE_LIMIT_PERIOD: ${RATE_LIMIT_PERIOD:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # License
      LICENSE_SECRET: ${LICENSE_SECRET:-license-secret-key}
      # Sentry
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - model_data:/app/models
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - anpr-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(api.${DOMAIN:-anpr.ir})"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.backend.middlewares=rate-limit@file,cors@file"

  # ==================== 6. Frontend (استریملیت) ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anpr-frontend
    restart: unless-stopped
    environment:
      API_BASE: http://backend:8000
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: false
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - anpr-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(anpr.${DOMAIN:-anpr.ir}) || Host(www.${DOMAIN:-anpr.ir})"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=8501"
      - "traefik.http.routers.frontend.middlewares=security-headers@file"
      # ==================== 7. OCR Service (سرویس جداگانه OCR) ====================
  ocr:
    build:
      context: ./backend
      dockerfile: Dockerfile.ocr
    container_name: anpr-ocr
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      OCR_LANGUAGES: fa,en,ar
      USE_GPU: ${OCR_USE_GPU:-true}
    volumes:
      - model_data:/app/models
    depends_on:
      - rabbitmq
    networks:
      - anpr-net
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 2G
    labels:
      - "traefik.enable=false"

  # ==================== 8. Prometheus (مانیتورینگ) ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: anpr-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    networks:
      - anpr-net
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(monitor.${DOMAIN:-anpr.ir})"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  # ==================== 9. Grafana (داشبورد مانیتورینگ) ====================
  grafana:
    image: grafana/grafana:latest
    container_name: anpr-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN:-anpr.ir}
    volumes:
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - anpr-net
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(grafana.${DOMAIN:-anpr.ir})"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana.middlewares=auth-basic@file"

  # ==================== 10. Nginx (لایه اضافی - اختیاری) ====================
  nginx:
    image: nginx:alpine
    container_name: anpr-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - uploads_data:/usr/share/nginx/html/uploads
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - anpr-net
    labels:
      - "traefik.enable=false"
    profiles:
      - without-traefik

# ==================== شبکه خارجی (برای Traefik) ====================
networks:
  anpr-net:
    name: anpr-network
    driver: bridge