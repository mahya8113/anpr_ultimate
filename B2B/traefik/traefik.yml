# traefik/traefik.yml
# فایل پیکربندی Traefik - Proxy معکوس و مدیریت ترافیک با قابلیت SSL خودکار

# ==================== تنظیمات عمومی ====================
global:
  checkNewVersion: true
  sendAnonymousUsage: false

# ==================== نقاط ورودی ====================
entryPoints:
  # نقطه ورود HTTP (پورت 80)
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
      middlewares:
        - rate-limit@file
        - security-headers@file
  
  # نقطه ورود HTTPS (پورت 443)
  websecure:
    address: ":443"
    http:
      middlewares:
        - rate-limit@file
        - security-headers@file
        - compress@file
      tls:
        certResolver: letsencrypt
        options:
          default:
            minVersion: VersionTLS12
            cipherSuites:
              - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
              - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
              - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
  
  # نقطه ورود برای مانیتورینگ
  traefik:
    address: ":8080"
    http:
      middlewares:
        - auth-basic@file

# ==================== ارائه‌دهندگان (Providers) ====================
providers:
  # ارائه‌دهنده Docker (تشخیص خودکار سرویس‌ها)
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: anpr-net
    swarmMode: false
    watch: true
  
  # ارائه‌دهنده فایل (برای تنظیمات سفارشی)
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

# ==================== حل‌کننده گواهی ====================
certificatesResolvers:
  # Let's Encrypt برای SSL خودکار
  letsencrypt:
    acme:
      email: admin@anpr.ir
      storage: /letsencrypt/acme.json
      # استفاده از HTTP Challenge
      httpChallenge:
        entryPoint: web
      # برای تست می‌توان از staging استفاده کرد
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory
      # برای تولید
      caServer: https://acme-v02.api.letsencrypt.org/directory
  
  # گواهی سفارشی (برای محیط داخلی)
  custom:
    acme:
      email: admin@anpr.ir
      storage: /letsencrypt/custom.json
      tlsChallenge: {}

# ==================== API و داشبورد ====================
api:
  dashboard: true
  debug: true
  insecure: false

# ==================== لاگ‌ها ====================
log:
  level: INFO
  filePath: /var/log/traefik.log
  format: json

accessLog:
  filePath: /var/log/access.log
  format: json
  filters:
    statusCodes:
      - "200"
      - "300-399"
      - "400-499"
      - "500-599"
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        X-Forwarded-For: keep
        Authorization: drop

# ==================== متریک‌ها ====================
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0